<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blood Donation Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family: 'Roboto', sans-serif;
  background: linear-gradient(135deg, #ff4d4d, #ff9999);
  min-height: 100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  color:#fff;
}

header {
  font-size:3rem;
  margin:1rem 0;
  text-align:center;
}

.quote {
  font-size:1.3rem;
  font-style:italic;
  text-align:center;
  margin-bottom:3rem;
}

.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:2rem;
  width:90%;
  max-width:900px;
}

.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(8px);
  width:180px;
  height:180px;
  border-radius:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:#fff;
  font-weight:bold;
  font-size:1.1rem;
  transition: 0.3s;
  box-shadow:2px 2px 15px rgba(0,0,0,0.3);
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
}

.card span { font-size:3rem; margin-bottom:0.5rem; }

/* blood animation */
.droplet {
  position:absolute;
  width:12px;
  height:12px;
  background:red;
  border-radius:50%;
  animation:drop linear infinite;
}

@keyframes drop {
  0% { transform: translateY(-50px); opacity:0; }
  50% { opacity:1; }
  100% { transform: translateY(700px); opacity:0; }
}
</style>
</head>

<body>

<header>❤️ Blood Donation Management</header>
<p class="quote">"Every drop counts. Save lives."</p>

<div class="container">

  <a href="bloodbank.html" class="card"><span>🏥</span>BLOOD BANK</a>
  <a href="employee.html" class="card"><span>🧑‍⚕️</span>EMPLOYEE</a>
  <a href="donor.html" class="card"><span>🩸</span>DONOR</a>
  <a href="patient.html" class="card"><span>👩‍⚕️</span>PATIENT</a>
  <a href="bloodrequest.html" class="card"><span>📩</span>REQUEST</a>
  <a href="inventory.html" class="card"><span>🧪</span>INVENTORY</a>

  <!-- ✅ ADMIN ADDED -->
  <a href="admin.html" class="card"><span>🛡️</span>ADMIN</a>

</div>

<script>
function createDroplets(){
  for(let i=0;i<25;i++){
    let d=document.createElement('div');
    d.className='droplet';
    d.style.left=Math.random()*window.innerWidth+'px';
    d.style.animationDuration=(3+Math.random()*3)+'s';
    d.style.animationDelay=(Math.random()*5)+'s';
    document.body.appendChild(d);
  }
}
createDroplets();
</script>

</body>
</html>
