<h1>Advantages of Donating Blood</h1>
<ul>
  <li>1. Save lives in emergencies.</li>
  <li>2. Reduce risk of heart disease.</li>
  <li>3. Boosts production of new blood cells.</li>
  <li>4. Helps maintain healthy iron levels.</li>
  <li>5. Gives a sense of social responsibility.</li>
  <li>6. Can help detect health issues early.</li>
</ul>
