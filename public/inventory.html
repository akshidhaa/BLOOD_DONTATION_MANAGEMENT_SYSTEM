<!DOCTYPE html>
<html>
<head>
    <title>Blood Inventory</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background-color: #f9f9f9;
            padding-top: 50px;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 520px;
            box-sizing: border-box;
        }
        h2 { text-align: center; }
        form div {
            margin-bottom: 12px;
        }
        label {
            display: inline-block;
            width: 140px;
            text-align: right;
            margin-right: 10px;
        }
        input, select {
            width: 250px;
            padding: 5px;
        }
        input[type="submit"], button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #4CAF50;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        input[type="submit"]:hover, button:hover {
            background-color: #45a049;
        }
        .table-container {
            width: 100%;
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 480px;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th { background-color: #f2f2f2; }
        .low-stock { background-color: #ffcccc; }

        /* Voice Assistant CSS */
        #voiceAssistant {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            width: 150px;
        }
        #assistantBtn {
            background-color: #fff;
            color: #4CAF50;
            border: none;
            border-radius: 50%;
            padding: 10px;
            font-size: 20px;
            cursor: pointer;
        }
        #assistantStatus {
            font-size: 12px;
            margin-top: 5px;
        }

        #searchInput {
            width: calc(100% - 20px);
            padding: 5px;
            margin-top: 10px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Blood Inventory</h2>

        <!-- Inventory Form -->
        <form id="inventoryForm">
            <div>
                <label>Blood Group:</label>
                <select id="blood_group" required>
                    <option value="">Select</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                </select>
            </div>
            <div>
                <label>Quantity (units):</label>
                <input type="number" id="quantity" min="1" required>
            </div>
            <div>
                <label>Received Date:</label>
                <input type="date" id="received_date" required>
            </div>
            <div>
                <label>Expiry Date:</label>
                <input type="date" id="expiry_date" required>
            </div>
            <div>
                <label>Contact Number:</label>
                <input type="text" id="contact" required>
            </div>
            <div>
                <label>Name:</label>
                <input type="text" id="name" required>
            </div>
            <div>
                <label>Age:</label>
                <input type="number" id="age" min="1" required>
            </div>
            <div>
                <label>Location:</label>
                <input type="text" id="location" required>
            </div>
            <input type="submit" value="Submit">
        </form>

        <!-- View & Search -->
        <button id="viewListBtn">View List</button>
        <input type="text" id="searchInput" placeholder="Type blood group or location...">
        <button id="searchDonorBtn">Search Donor</button>
        <button id="searchPatientBtn">Search Patient</button>

        <!-- Inventory Table -->
        <div class="table-container">
            <table id="inventoryTable" style="display:none;">
                <tr>
                    <th>Blood Group</th>
                    <th>Quantity</th>
                    <th>Received Date</th>
                    <th>Expiry Date</th>
                    <th>Contact</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Location</th>
                    <th>Status</th>
                </tr>
            </table>
        </div>
    </div>

    <!-- Voice Assistant -->
    <div id="voiceAssistant">
        <button id="assistantBtn">🎤</button>
        <p id="assistantStatus">Click to speak</p>
    </div>

    <script>
        // --- Inventory Storage & Render ---
        const form = document.getElementById('inventoryForm');
        const table = document.getElementById('inventoryTable');
        const viewBtn = document.getElementById('viewListBtn');

        let inventory = JSON.parse(localStorage.getItem('bloodInventory')) || [];

        function renderTable(data = inventory) {
            table.style.display = 'table';
            table.innerHTML = `<tr>
                <th>Blood Group</th>
                <th>Quantity</th>
                <th>Received Date</th>
                <th>Expiry Date</th>
                <th>Contact</th>
                <th>Name</th>
                <th>Age</th>
                <th>Location</th>
                <th>Status</th>
            </tr>`;

            const today = new Date().toISOString().split('T')[0];

            data.forEach(item => {
                const row = table.insertRow();
                let status = "Available";
                let rowClass = "";
                if(item.expiryDate < today) { status="Expired"; rowClass="low-stock"; }
                else if(item.quantity < 5) { status="Low Stock"; rowClass="low-stock"; }

                row.className = rowClass;
                row.insertCell(0).innerText = item.bloodGroup;
                row.insertCell(1).innerText = item.quantity;
                row.insertCell(2).innerText = item.receivedDate;
                row.insertCell(3).innerText = item.expiryDate;
                row.insertCell(4).innerText = item.contact;
                row.insertCell(5).innerText = item.name;
                row.insertCell(6).innerText = item.age;
                row.insertCell(7).innerText = item.location;
                row.insertCell(8).innerText = status;
            });
        }

        form.addEventListener('submit', function(e){
            e.preventDefault();
            const bloodGroup = document.getElementById('blood_group').value;
            const quantity = parseInt(document.getElementById('quantity').value);
            const receivedDate = document.getElementById('received_date').value;
            const expiryDate = document.getElementById('expiry_date').value;
            const contact = document.getElementById('contact').value;
            const name = document.getElementById('name').value;
            const age = parseInt(document.getElementById('age').value);
            const location = document.getElementById('location').value;

            if(expiryDate < receivedDate){
                alert("Expiry date cannot be before received date.");
                return;
            }

            inventory.push({bloodGroup, quantity, receivedDate, expiryDate, contact, name, age, location});
            localStorage.setItem('bloodInventory', JSON.stringify(inventory));
            alert("Blood entry added successfully!");
            form.reset();
        });

        viewBtn.addEventListener('click', function(){
            if(table.style.display === 'none'){ renderTable(); viewBtn.innerText="Hide List"; }
            else { table.style.display='none'; viewBtn.innerText="View List"; }
        });

        // --- Search Buttons ---
        const searchInput = document.getElementById('searchInput');

        function filterInventory(keyword){
            keyword = keyword.toLowerCase();
            const filtered = inventory.filter(item => 
                item.bloodGroup.toLowerCase().includes(keyword) ||
                item.location.toLowerCase().includes(keyword)
            );
            renderTable(filtered);
            speak(`${filtered.length} matching results`);
        }

        document.getElementById('searchDonorBtn').addEventListener('click', () => filterInventory(searchInput.value));
        document.getElementById('searchPatientBtn').addEventListener('click', () => filterInventory(searchInput.value));

        // --- Voice Assistant ---
        const assistantBtn = document.getElementById('assistantBtn');
        const assistantStatus = document.getElementById('assistantStatus');

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.interimResults = false;

        assistantBtn.addEventListener('click', () => { recognition.start(); assistantStatus.innerText="Listening..."; });
        recognition.onresult = function(event){
            const command = event.results[0][0].transcript.toLowerCase();
            assistantStatus.innerText = `You said: "${command}"`;
            filterInventory(command);
        };
        recognition.onspeechend = function(){ recognition.stop(); assistantStatus.innerText="Click to speak"; };
        function speak(text){ const utterance=new SpeechSynthesisUtterance(text); speechSynthesis.speak(utterance); }
    </script>
</body>
</html>
